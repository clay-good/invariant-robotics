# Stress test: 10M commands across all scenario types.
# Used for local pre-GPU validation.
#
# Runtime: ~60 seconds on Apple M-series.

name: stress_test_10m
profile: ur10e_cnc_tending
environments: 1
episodes_per_env: 50000
steps_per_episode: 200
scenarios:
  - scenario_type: baseline
    weight: 0.01

  - scenario_type: aggressive
    weight: 0.44
    injections:
      - position_violation
      - velocity_overshoot
      - torque_spike

  - scenario_type: exclusion_zone
    weight: 0.19

  - scenario_type: baseline
    weight: 0.09
    injections:
      - torque_spike
      - nan_injection

  - scenario_type: authority_escalation
    weight: 0.05

  - scenario_type: chain_forgery
    weight: 0.04

  - scenario_type: baseline
    weight: 0.05
    injections:
      - velocity_overshoot
      - position_violation

  - scenario_type: cnc_tending
    weight: 0.04

  - scenario_type: environment_fault
    weight: 0.03

  - scenario_type: baseline
    weight: 0.05
    injections:
      - nan_injection

  - scenario_type: baseline
    weight: 0.01
    injections:
      - e_stop_engage

success_criteria:
  min_legitimate_pass_rate: 0.0
  max_violation_escape_rate: 0.0
  max_false_rejection_rate: 1.0
