# CNC Tending — 1M Validation Campaign
#
# 1,060,000 episodes validating Invariant on the UR10e + Haas VF-2SS
# CNC tending cell. This is the proof package for the equipment loan.
#
# Matches the cell specification Section 8.1 campaign definition.
#
# Expected result: 0 escapes across 1,060,000 episodes.
# Statistical claim: escape rate < 0.0003% with 95% confidence.
#
# NOTE: This campaign generates 106M total commands (64 envs × 16563 eps × 100 steps)
# which exceeds the dry-run 100M command limit. Use cnc_tending_dry_run.yaml for local
# validation, or run this on cloud GPU with Isaac Lab.
#
# Local dry-run (scaled version):
#   invariant campaign --config campaigns/cnc_tending_dry_run.yaml --key keys.json --dry-run
#
# Isaac Lab usage (requires Isaac Sim + GPU):
#   invariant serve --profile profiles/ur10e_cnc_tending.json --key keys.json --bridge --digital-twin
#   python isaac/envs/cnc_tending.py  # connects via Unix socket

name: cnc_tending_1m_validation
profile: ur10e_cnc_tending
environments: 64
episodes_per_env: 16563
steps_per_episode: 100
scenarios:
  # 10,000 episodes: Standard load/unload cycles. No faults.
  # Proves: the cell works. ≥95% completion rate.
  - scenario_type: baseline
    weight: 0.0094

  # 500 episodes: Verify all waypoints reachable without collision.
  # Proves: robot can reach all waypoints. 100% reachable.
  - scenario_type: baseline
    weight: 0.0005

  # 500,000 episodes: Random illegal joint positions, velocities, torques.
  # Proves: Invariant blocks ALL illegal joint commands. 100% rejection.
  - scenario_type: aggressive
    weight: 0.47
    injections:
      - position_violation
      - velocity_overshoot
      - torque_spike

  # 200,000 episodes: Attempt to enter Haas spindle area during cut.
  # Proves: robot CANNOT enter spindle area during cut. 100% rejection.
  - scenario_type: exclusion_zone
    weight: 0.19

  # 100,000 episodes: Gripper drop, part misplace, force anomalies.
  # Proves: Invariant detects gripper drops, force spikes. 100% detection.
  - scenario_type: baseline
    weight: 0.09
    injections:
      - torque_spike
      - nan_injection

  # 50,000 episodes: Kill heartbeat at random points. Robot must stop.
  # Proves: robot stops within 200ms of heartbeat loss. 100% stop rate.
  - scenario_type: baseline
    weight: 0.05
    injections:
      - replay_attack

  # 100,000 episodes: Attempt commands without valid PIC chain.
  # Proves: invalid/forged authority chains rejected. 100% rejection.
  - scenario_type: authority_escalation
    weight: 0.05
  - scenario_type: chain_forgery
    weight: 0.04

  # 100,000 episodes: Complete cycles with random faults from all categories.
  # Proves: end-to-end with random faults. Zero safety escapes.
  - scenario_type: baseline
    weight: 0.05
    injections:
      - velocity_overshoot
      - torque_spike
      - position_violation
      - nan_injection
      - self_collision
      - workspace_escape
  - scenario_type: cnc_tending
    weight: 0.03

  # 10,000 episodes: Environmental faults — P21-P25 (terrain, temp, battery, latency, e-stop).
  # Proves: Invariant rejects all environmental hazards. 100% rejection.
  - scenario_type: environment_fault
    weight: 0.01

success_criteria:
  min_legitimate_pass_rate: 0.95
  max_violation_escape_rate: 0.0
  max_false_rejection_rate: 0.05
