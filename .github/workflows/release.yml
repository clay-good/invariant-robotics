name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Gate: run the full test + lint suite before publishing anything
  # ---------------------------------------------------------------------------
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  # ---------------------------------------------------------------------------
  # Publish crates to crates.io in dependency order
  # ---------------------------------------------------------------------------
  publish-crates:
    name: Publish to crates.io
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish invariant-robotics-core
        run: cargo publish -p invariant-robotics-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish invariant-robotics-eval
        run: cargo publish -p invariant-robotics-eval
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish invariant-robotics-sim
        run: cargo publish -p invariant-robotics-sim
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish invariant-robotics-coordinator
        run: cargo publish -p invariant-robotics-coordinator
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish invariant-robotics-fuzz
        run: cargo publish -p invariant-robotics-fuzz
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish invariant-robotics (CLI)
        run: cargo publish -p invariant-robotics
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ---------------------------------------------------------------------------
  # Generate CycloneDX SBOM and attach to the GitHub Release
  # ---------------------------------------------------------------------------
  sbom:
    name: Generate SBOM
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-cyclonedx
      - run: cargo cyclonedx --all --format json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: "*.cdx.json"

  # ---------------------------------------------------------------------------
  # Build release binaries for 4 targets and attach to the GitHub Release
  # ---------------------------------------------------------------------------
  build-binaries:
    name: Build (${{ matrix.target }})
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf invariant-${{ matrix.target }}.tar.gz invariant

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/invariant-${{ matrix.target }}.tar.gz

  # ---------------------------------------------------------------------------
  # Create a versioned GitHub Release from the pushed tag
  # ---------------------------------------------------------------------------
  github-release:
    name: GitHub Release
    needs: [preflight, build-binaries, sbom]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: dist/

      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: dist/

      - name: Create versioned release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/invariant-*.tar.gz
            dist/*.cdx.json

  # ---------------------------------------------------------------------------
  # Move the `latest` tag and update/create the "latest" GitHub Release
  # ---------------------------------------------------------------------------
  latest-tag:
    name: Update latest tag
    needs: [publish-crates, github-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Move latest tag to current commit
        run: |
          git tag -f latest
          git push origin latest --force

      - name: Upsert latest GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"

          BODY="$(cat <<EOF
          **Latest stable release: ${VERSION}**

          This release always points to the most recent versioned tag.
          For release notes see the [${VERSION} release](https://github.com/${{ github.repository }}/releases/tag/${VERSION}).

          \`\`\`sh
          cargo install invariant-robotics
          \`\`\`
          EOF
          )"

          # Delete existing latest release if present, then recreate
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest \
            --title "Latest (${VERSION})" \
            --notes "${BODY}" \
            --prerelease=false
